<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin – Container Board</title>
<script src="/socket.io/socket.io.js"></script>
<script>
  const __design = new URLSearchParams(location.search).get("design");
  document.documentElement.dataset.design = __design === "2" ? "2" : "1";
</script>

<style>
:root{
  --bg:#0b1220;
  --card:#111a2e;
  --muted:#a7b3d1;
  --white:#f6f8ff;
  --green:#22c55e;
  --red:#ef4444;
  --stroke:rgba(255,255,255,.08);
  --shadow: 0 10px 30px rgba(0,0,0,.35);
  --radius: 18px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
  color:var(--white);
  background: radial-gradient(1200px 600px at 20% 0%, rgba(59,130,246,.12), transparent 55%),
              radial-gradient(900px 600px at 80% 20%, rgba(34,197,94,.10), transparent 55%),
              var(--bg);
}
header{
  overflow:hidden;
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
  background: rgba(11,18,32,.65);
  border-bottom: 1px solid var(--stroke);
  z-index: 10;
}

header::after{
  content:"";
  position:absolute;
  top:6px;
  right:18px;
  bottom:6px;
  width:140px;
  background: url("/logo.png") no-repeat right center / contain;
  opacity:.16;
  pointer-events:none;
}
header .wrap{ position: relative; z-index: 1; }
.top{ padding-right: 152px; }

html[data-design="2"] body{
  background: radial-gradient(1200px 600px at 80% 0%, rgba(14,165,233,.16), transparent 55%),
              radial-gradient(900px 600px at 20% 20%, rgba(245,158,11,.12), transparent 55%),
              var(--bg);
}
html[data-design="2"] header{
  background: linear-gradient(90deg, rgba(11,18,32,.88), rgba(11,18,32,.58));
  border-bottom-color: rgba(255,255,255,.16);
}
html[data-design="2"] header::after{
  left:18px;
  right:auto;
  width:168px;
  background: url("/logo.png") no-repeat left center / contain;
  opacity:.24;
  filter: drop-shadow(0 0 12px rgba(255,255,255,.2));
}
html[data-design="2"] .top{
  padding-right: 0;
  padding-left: 180px;
}

@media (max-width: 900px){
  header::after{
    width: 108px;
    opacity: .12;
  }
  .top,
  html[data-design="2"] .top{
    padding-left: 0;
    padding-right: 0;
  }
}

@media (max-width: 640px){
  header::after{ display:none; }
}

@media (prefers-color-scheme: light){
  :root{
    --bg:#eef3fb;
    --card:#ffffff;
    --muted:#3d4c68;
    --white:#10213b;
    --stroke:rgba(16,33,59,.18);
  }
  body{
    background: radial-gradient(1100px 520px at 20% 0%, rgba(59,130,246,.20), transparent 60%),
                radial-gradient(900px 600px at 80% 20%, rgba(16,185,129,.16), transparent 60%),
                var(--bg);
  }
  html[data-design="2"] body{
    background: radial-gradient(1200px 600px at 80% 0%, rgba(14,165,233,.20), transparent 55%),
                radial-gradient(900px 600px at 20% 20%, rgba(245,158,11,.18), transparent 55%),
                var(--bg);
  }
  header{
    background: rgba(255,255,255,.82);
  }
  html[data-design="2"] header{
    background: linear-gradient(90deg, rgba(255,255,255,.92), rgba(255,255,255,.72));
    border-bottom-color: rgba(16,33,59,.20);
  }
}

.wrap{
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px 18px;
}
.top{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
}
h1{ margin:0; font-size: 20px; letter-spacing:.4px; }
.sub{ margin:6px 0 0; color: var(--muted); font-size: 13px; }

.legend{
  display:flex;
  gap:14px;
  align-items:center;
  flex-wrap:wrap;
  color: var(--muted);
  font-size: 13px;
}
.badge{
  display:flex; align-items:center; gap:8px;
  padding: 8px 10px;
  border-radius: 999px;
  border:1px solid var(--stroke);
  background: rgba(255,255,255,.03);
}
.dot{width:10px;height:10px;border-radius:999px}
.dot.red{background:var(--red)}
.dot.green{background:var(--green)}

main .wrap{ padding-top: 18px; padding-bottom: 22px; }

.grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
@media (min-width: 860px){
  .grid{ grid-template-columns: repeat(4, 1fr); }
}

.card{
  border-radius: var(--radius);
  background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  border: 1px solid var(--stroke);
  box-shadow: var(--shadow);
  overflow:hidden;
}

.cardTop{
  padding: 12px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--stroke);
}
.name{ font-weight: 800; letter-spacing:.3px; }

.controls{
  padding: 14px;
  display:flex;
  flex-direction:column;
  gap: 12px;
}

label{
  font-size: 12px;
  color: var(--muted);
  display:block;
  margin-bottom:6px;
}

input{
  width:100%;
  font-size: 18px;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--stroke);
  background: rgba(255,255,255,.06);
  color: var(--white);
  outline: none;
}

.row{
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--stroke);
  background: rgba(255,255,255,.06);
  color: var(--white);
  font-weight: 800;
  cursor: pointer;
}
.btn:hover{ background: rgba(255,255,255,.10); }

.btn.redActive{
  background: rgba(239,68,68,.25);
  border-color: rgba(239,68,68,.35);
}
.btn.greenActive{
  background: rgba(34,197,94,.25);
  border-color: rgba(34,197,94,.35);
}

.topActions{
  display:flex;
  gap:10px;
  align-items:center;
}
.smallBtn{
  padding: 8px 10px;
  border-radius: 12px;
  border: 1px solid var(--stroke);
  background: rgba(255,255,255,.06);
  color: var(--white);
  cursor:pointer;
  font-size: 13px;
  font-weight: 800;
}
.smallBtn:hover{ background: rgba(255,255,255,.10); }

.notice{
  margin-top: 6px;
  color: var(--muted);
  font-size: 12px;
}
.toast{
  position: fixed;
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);
  background: rgba(17,26,46,.92);
  border: 1px solid var(--stroke);
  color: var(--white);
  padding: 10px 12px;
  border-radius: 14px;
  box-shadow: var(--shadow);
  display:none;
  font-size: 13px;
}
.block{
  max-width: 520px;
  margin: 18px auto 0;
  padding: 14px;
  border-radius: 16px;
  border: 1px solid var(--stroke);
  background: rgba(255,255,255,.04);
}
</style>
</head>

<body>
<header>
  <div class="wrap top">
    <div>
      <h1>Admin Steuerung</h1>
      <div class="sub">Rot = Warten · Grün = An die Rampe</div>
    </div>
    <div class="topActions">
      <button class="smallBtn" id="resetBtn">Alle zurücksetzen</button>
      <div class="legend">
        <div class="badge"><span class="dot red"></span>Warten</div>
        <div class="badge"><span class="dot green"></span>An die Rampe</div>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <div id="authBlock" class="block" style="display:none">
      <div style="font-weight:900; font-size:16px;">Kein Admin-Zugriff</div>
      <div class="notice">Füge <b>?key=DEIN_ADMIN_KEY</b> an die URL an oder setze den ENV <b>ADMIN_KEY</b> am Server.</div>
    </div>

    <div id="grid" class="grid" style="display:none"></div>
  </div>
</main>

<div id="toast" class="toast"></div>

<script>
const socket = io();
let current = {};
let isAuthed = false;

const params = new URLSearchParams(location.search);
const key = params.get("key") || "";

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(showToast._to);
  showToast._to = setTimeout(()=> t.style.display="none", 2200);
}

function stateText(color){
  return color === "green" ? "An die Rampe" : "Warten";
}

function renderAll(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  for(let i=1;i<=8;i++){
    const c = current[i];
    const card = document.createElement("div");
    card.className = "card";
    card.id = "card-"+i;

    card.innerHTML = `
      <div class="cardTop">
        <div class="name">Container ${i}</div>
        <div style="color: var(--muted); font-size:12px;">${stateText(c.color)}</div>
      </div>
      <div class="controls">
        <div>
          <label>Kennzeichen</label>
          <input id="inp-${i}" value="${(c.plate||"").replace(/"/g,'&quot;')}" placeholder="z.B. B-AB 1234" />
          <div class="notice">Änderung wird sofort gespeichert.</div>
        </div>
        <div class="row">
          <button class="btn ${c.color==="red" ? "redActive":""}" id="btnR-${i}">Rot</button>
          <button class="btn ${c.color==="green" ? "greenActive":""}" id="btnG-${i}">Grün</button>
        </div>
      </div>
    `;
    grid.appendChild(card);

    // Events
    const inp = document.getElementById("inp-"+i);
    let plateTimer = null;
    inp.addEventListener("input", (e) => {
      clearTimeout(plateTimer);
      plateTimer = setTimeout(() => {
        socket.emit("updatePlate", { id: i, plate: e.target.value });
      }, 250); // kleines Debounce
    });

    document.getElementById("btnR-"+i).addEventListener("click", () => {
      socket.emit("updateStatus", { id: i, color: "red" });
    });
    document.getElementById("btnG-"+i).addEventListener("click", () => {
      socket.emit("updateStatus", { id: i, color: "green" });
    });
  }
}

function applyOne(id, data){
  current[id] = data;

  // Buttons aktualisieren
  const btnR = document.getElementById("btnR-"+id);
  const btnG = document.getElementById("btnG-"+id);
  if (btnR && btnG){
    btnR.classList.toggle("redActive", data.color === "red");
    btnG.classList.toggle("greenActive", data.color === "green");
  }

  // Input nur updaten, wenn es gerade nicht fokussiert ist (sonst nervig beim Tippen)
  const inp = document.getElementById("inp-"+id);
  if (inp && document.activeElement !== inp){
    inp.value = data.plate || "";
  }

  // Status-Text in cardTop
  const top = document.querySelector(`#card-${id} .cardTop div:last-child`);
  if (top) top.textContent = stateText(data.color);
}

socket.on("init", (status) => {
  current = status;

  // Auth versuchen
  socket.emit("adminAuth", { key });
});

socket.on("adminAuthResult", ({ ok }) => {
  isAuthed = !!ok;
  document.getElementById("authBlock").style.display = isAuthed ? "none" : "block";
  document.getElementById("grid").style.display = isAuthed ? "grid" : "none";
  if (isAuthed){
    renderAll();
    showToast("Admin aktiviert");
  } else {
    showToast("Kein Admin-Zugriff");
  }
});

socket.on("statusChanged", ({ id, data }) => {
  if (!isAuthed) return;
  applyOne(id, data);
  showToast(`Container ${id}: ${stateText(data.color)}`);
});

// Reset
document.getElementById("resetBtn").addEventListener("click", () => {
  if (!isAuthed) return;
  if (confirm("Alle Container zurücksetzen?")) {
    socket.emit("resetAll");
  }
});
</script>
</body>
</html>
