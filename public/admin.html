<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin – Container Board</title>
<script src="/socket.io/socket.io.js"></script>

<style>
:root{
  --bg:#0b1220;
  --muted:#a7b3d1;
  --white:#f6f8ff;
  --green:#22c55e;
  --orange:#f59e0b;
  --red:#ef4444;
  --stroke:rgba(255,255,255,.08);
  --shadow: 0 10px 30px rgba(0,0,0,.35);
  --radius: 18px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
  color:var(--white);
  background: radial-gradient(1200px 600px at 20% 0%, rgba(59,130,246,.12), transparent 55%),
              radial-gradient(900px 600px at 80% 20%, rgba(34,197,94,.10), transparent 55%),
              var(--bg);
}
header{
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
  background: rgba(11,18,32,.65);
  border-bottom: 1px solid var(--stroke);
  z-index: 10;
}
.wrap{ max-width:1100px; margin:0 auto; padding:16px 18px; }
.top{ display:flex; align-items:flex-end; justify-content:space-between; gap:14px; flex-wrap:wrap; }
h1{ margin:0; font-size:20px; letter-spacing:.4px; }
.sub{ margin:6px 0 0; color:var(--muted); font-size:13px; }

.legend{
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  color: var(--muted); font-size: 13px;
}
.badge{
  display:flex; align-items:center; gap:8px;
  padding: 8px 10px; border-radius:999px;
  border:1px solid var(--stroke);
  background: rgba(255,255,255,.03);
}
.dot{width:10px;height:10px;border-radius:999px}
.dot.red{background:var(--red)}
.dot.orange{background:var(--orange)}
.dot.green{background:var(--green)}

.topActions{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.smallBtn{
  padding: 8px 10px;
  border-radius: 12px;
  border: 1px solid var(--stroke);
  background: rgba(255,255,255,.06);
  color: var(--white);
  cursor:pointer;
  font-size: 13px;
  font-weight: 900;
}
.smallBtn:hover{ background: rgba(255,255,255,.10); }

main .wrap{ padding-top:18px; padding-bottom:22px; }

.grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
@media (min-width: 860px){
  .grid{ grid-template-columns: repeat(4, 1fr); }
}

.card{
  border-radius: var(--radius);
  background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  border: 1px solid var(--stroke);
  box-shadow: var(--shadow);
  overflow:hidden;
}
.card.is-orange{
  border-color: rgba(245,158,11,.65);
  box-shadow: 0 0 0 2px rgba(245,158,11,.22), var(--shadow);
}

.cardTop{
  padding: 12px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--stroke);
}
.name{ font-weight: 950; letter-spacing:.3px; }

.statusTag{
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 999px;
  border:1px solid var(--stroke);
  background: rgba(255,255,255,.04);
  color: var(--muted);
  font-weight: 900;
}
.tag-red{ background: rgba(239,68,68,.18); border-color: rgba(239,68,68,.35); color: var(--white); }
.tag-orange{ background: rgba(245,158,11,.20); border-color: rgba(245,158,11,.45); color: var(--white); }
.tag-green{ background: rgba(34,197,94,.18); border-color: rgba(34,197,94,.35); color: var(--white); }

.controls{
  padding: 14px;
  display:flex;
  flex-direction:column;
  gap: 12px;
}
label{
  font-size: 12px;
  color: var(--muted);
  display:block;
  margin-bottom:6px;
}
.readonly{
  width:100%;
  font-size: 18px;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--stroke);
  background: rgba(255,255,255,.04);
  color: var(--white);
}

.regBox{
  width:100%;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid rgba(245,158,11,.45);
  background: rgba(245,158,11,.14);
  color: var(--white);
  font-weight: 900;
  display:none;
}
.card.is-orange .regBox{ display:block; }

input[type="time"]{
  width:100%;
  font-size: 18px;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--stroke);
  background: rgba(255,255,255,.06);
  color: var(--white);
  outline:none;
}
.row{ display:flex; gap:10px; }
.btn{
  flex:1;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--stroke);
  background: rgba(255,255,255,.06);
  color: var(--white);
  font-weight: 950;
  cursor: pointer;
}
.btn:hover{ background: rgba(255,255,255,.10); }
.btn.redActive{ background: rgba(239,68,68,.25); border-color: rgba(239,68,68,.35); }
.btn.greenActive{ background: rgba(34,197,94,.25); border-color: rgba(34,197,94,.35); }

.note{ font-size: 12px; color: var(--muted); }

.block{
  max-width: 520px;
  margin: 18px auto 0;
  padding: 14px;
  border-radius: 16px;
  border: 1px solid var(--stroke);
  background: rgba(255,255,255,.04);
}

.toast{
  position: fixed;
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);
  background: rgba(17,26,46,.92);
  border: 1px solid var(--stroke);
  color: var(--white);
  padding: 10px 12px;
  border-radius: 14px;
  box-shadow: var(--shadow);
  display:none;
  font-size: 13px;
}

/* ===== Historie Panel ===== */
.panel{
  margin-top: 16px;
  border: 1px solid var(--stroke);
  border-radius: 16px;
  background: rgba(255,255,255,.03);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.panelHead{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  padding: 12px 14px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.panelTitle{ font-weight: 950; }
.panelBody{ padding: 12px 14px; }
.historyControls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
select{
  padding: 8px 10px;
  border-radius: 12px;
  border: 1px solid var(--stroke);
  background: rgba(255,255,255,.06);
  color: var(--white);
}
.table{
  width:100%;
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 13px;
}
.table th, .table td{
  text-align:left;
  padding: 8px 6px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  color: var(--white);
  vertical-align: top;
}
.table th{ color: var(--muted); font-weight: 900; }
.muted{ color: var(--muted); }
</style>
</head>

<body>
<header>
  <div class="wrap top">
    <div>
      <h1>Admin Steuerung</h1>
    </div>

    <div class="topActions">
      <button class="smallBtn" id="resetAllBtn">Alle zurücksetzen</button>
      <div class="legend">
        <div class="badge"><span class="dot red"></span>Warten</div>
        <div class="badge"><span class="dot orange"></span>Angemeldet</div>
        <div class="badge"><span class="dot green"></span>An die Rampe</div>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <div id="authBlock" class="block" style="display:none">
      <div style="font-weight:950; font-size:16px;">Kein Admin-Zugriff</div>
      <div class="note">Öffne mit <b>?key=DEIN_ADMIN_KEY</b> oder setze am Server <b>ADMIN_KEY</b>.</div>
    </div>

    <div id="grid" class="grid" style="display:none"></div>

    <!-- Historie -->
    <div id="historyPanel" class="panel" style="display:none;">
      <div class="panelHead">
        <div class="panelTitle">Historie</div>
        <div class="historyControls">
          <select id="histLimit">
            <option value="100">Letzte 100</option>
            <option value="200" selected>Letzte 200</option>
            <option value="500">Letzte 500</option>
            <option value="1000">Letzte 1000</option>
          </select>
          <button class="smallBtn" id="histRefresh">Aktualisieren</button>
          <button class="smallBtn" id="histCSV">CSV Download</button>
          <button class="smallBtn" id="histClear">Historie löschen</button>
        </div>
      </div>
      <div class="panelBody">
        <div class="muted">Tip: CSV Download funktioniert nur als Admin (Key in URL).</div>
        <table class="table" id="histTable">
          <thead>
            <tr>
              <th>Zeit</th>
              <th>Status</th>
              <th>Container</th>
              <th>Kennzeichen</th>
            </tr>
          </thead>
          <tbody id="histBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div id="toast" class="toast"></div>

<script>
const socket = io();
let current = {};
let isAuthed = false;

const params = new URLSearchParams(location.search);
const key = params.get("key") || "";

// ===== UI helpers =====
function statusText(status){
  if (status === "green") return "An die Rampe";
  if (status === "orange") return "Angemeldet";
  return "Warten";
}
function tagClass(status){
  if (status === "green") return "tag-green";
  if (status === "orange") return "tag-orange";
  return "tag-red";
}
function cardClass(status){
  if (status === "orange") return "is-orange";
  return "";
}
function registeredTime(iso){
  if (!iso) return "--:--";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "--:--";
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(showToast._to);
  showToast._to = setTimeout(()=> t.style.display="none", 2200);
}

// ===== Cards =====
function renderAll(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for(let i=1;i<=8;i++){
    const c = current[i];
    const reg = registeredTime(c.registeredAt);

    const card = document.createElement("div");
    card.className = "card " + cardClass(c.status);
    card.id = "card-"+i;

    card.innerHTML = `
      <div class="cardTop">
        <div class="name">Container ${i}</div>
        <div class="statusTag ${tagClass(c.status)}" id="tag-${i}">${statusText(c.status)}</div>
      </div>

      <div class="controls">
        <div class="regBox" id="regBox-${i}">🕒 Angemeldet um: <span id="reg-${i}">${reg}</span></div>

        <div>
          <label>Kennzeichen (vom Fahrer)</label>
          <div class="readonly" id="plate-${i}">${c.plate && c.plate.trim() ? c.plate : "---"}</div>
          <div class="note">Bei Anmeldung wird Status automatisch <b>Orange</b>.</div>
        </div>

        <div>
          <label>Termin (Uhrzeit)</label>
          <input type="time" id="time-${i}" value="${c.time || ""}" />
          <div class="note">Änderung wird sofort gespeichert.</div>
        </div>

        <div class="row">
          <button class="btn ${c.status==="red" ? "redActive" : ""}" id="btnR-${i}">Rot</button>
          <button class="btn ${c.status==="green" ? "greenActive" : ""}" id="btnG-${i}">Grün</button>
        </div>

        <button class="smallBtn" id="reset-${i}" style="width:100%;">Container zurücksetzen</button>
      </div>
    `;

    grid.appendChild(card);

    // Zeit ändern (debounce)
    const timeEl = document.getElementById("time-"+i);
    let timeTimer = null;
    timeEl.addEventListener("input", (e) => {
      clearTimeout(timeTimer);
      timeTimer = setTimeout(() => {
        socket.emit("adminSetTime", { id: i, time: e.target.value });
      }, 200);
    });

    // Status Buttons (nur rot/grün)
    document.getElementById("btnR-"+i).addEventListener("click", () => {
      socket.emit("adminSetStatus", { id: i, status: "red" });
    });
    document.getElementById("btnG-"+i).addEventListener("click", () => {
      socket.emit("adminSetStatus", { id: i, status: "green" });
    });

    // Container Reset
    document.getElementById("reset-"+i).addEventListener("click", () => {
      if (confirm(`Container ${i} wirklich zurücksetzen?`)) {
        socket.emit("adminResetContainer", { id: i });
      }
    });
  }
}

function applyOne(id, data){
  current[id] = data;

  // Card highlight für Orange
  const card = document.getElementById("card-"+id);
  card.className = "card " + cardClass(data.status);

  // Tag
  const tag = document.getElementById("tag-"+id);
  tag.textContent = statusText(data.status);
  tag.className = "statusTag " + tagClass(data.status);

  // Plate
  document.getElementById("plate-"+id).textContent = data.plate && data.plate.trim() ? data.plate : "---";

  // Reg Time
  const reg = registeredTime(data.registeredAt);
  const regEl = document.getElementById("reg-"+id);
  if (regEl) regEl.textContent = reg;

  // Zeit nur updaten, wenn nicht gerade editiert
  const t = document.getElementById("time-"+id);
  if (t && document.activeElement !== t) t.value = data.time || "";

  // Buttons
  const btnR = document.getElementById("btnR-"+id);
  const btnG = document.getElementById("btnG-"+id);
  if (btnR && btnG){
    btnR.classList.toggle("redActive", data.status === "red");
    btnG.classList.toggle("greenActive", data.status === "green");
  }
}

socket.on("init", (state) => {
  current = state;
  socket.emit("adminAuth", { key });
});

socket.on("adminAuthResult", ({ ok }) => {
  isAuthed = !!ok;
  document.getElementById("authBlock").style.display = isAuthed ? "none" : "block";
  document.getElementById("grid").style.display = isAuthed ? "grid" : "none";

  if (isAuthed){
    renderAll();
    showToast("Admin aktiviert");
  } else {
    showToast("Kein Admin-Zugriff");
  }
});

socket.on("statusChanged", ({ id, data }) => {
  if (!isAuthed) return;
  applyOne(id, data);
  showToast(`Container ${id}: ${statusText(data.status)}`);
});

// Reset All
document.getElementById("resetAllBtn").addEventListener("click", () => {
  if (!isAuthed) return;
  if (confirm("Alle Container wirklich zurücksetzen?")) {
    socket.emit("resetAll");
  }
});
</script>
</body>
</html>
