<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fahrer Anmeldung</title>
<script src="/socket.io/socket.io.js"></script>

<style>
:root{
  --bg:#0b1220;
  --muted:#a7b3d1;
  --white:#f6f8ff;
  --stroke:rgba(255,255,255,.10);
  --shadow: 0 10px 30px rgba(0,0,0,.35);
  --radius: 18px;

  --red:#ef4444;
  --orange:#f59e0b;
  --green:#22c55e;
  --card: rgba(255,255,255,.05);
  --card2: rgba(255,255,255,.02);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
  color:var(--white);
  background:
    radial-gradient(1200px 600px at 20% 0%, rgba(59,130,246,.12), transparent 55%),
    radial-gradient(900px 600px at 80% 20%, rgba(245,158,11,.10), transparent 55%),
    var(--bg);
}
header{
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
  background: rgba(11,18,32,.70);
  border-bottom: 1px solid var(--stroke);
  z-index: 10;
}
.wrap{
  max-width: 980px;
  margin: 0 auto;
  padding: 14px 16px;
}
.top{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap: 12px;
  flex-wrap: wrap;
}
h1{ margin:0; font-size: 20px; letter-spacing:.3px; }
.sub{ margin:6px 0 0; color: var(--muted); font-size: 13px; }

.legend{
  display:flex;
  gap: 10px;
  flex-wrap: wrap;
  color: var(--muted);
  font-size: 12px;
}
.badge{
  display:flex;
  align-items:center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 999px;
  border: 1px solid var(--stroke);
  background: rgba(255,255,255,.03);
}
.dot{ width:10px; height:10px; border-radius: 999px; }
.dot.red{ background: var(--red); }
.dot.orange{ background: var(--orange); }
.dot.green{ background: var(--green); }

main .wrap{ padding-top: 16px; padding-bottom: 22px; }

.grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
@media (min-width: 860px){
  .grid{ grid-template-columns: repeat(4, 1fr); }
}

.slot{
  border-radius: var(--radius);
  border: 1px solid var(--stroke);
  background: linear-gradient(180deg, var(--card), var(--card2));
  box-shadow: var(--shadow);
  overflow:hidden;
  cursor: pointer;
  user-select: none;
  transition: transform .08s ease, opacity .08s ease;
}
.slot:active{ transform: scale(.99); }
.slot.disabled{ opacity: .55; cursor: not-allowed; }
.slot.selected{ outline: 3px solid rgba(255,255,255,.35); outline-offset: 2px; }

.slotTop{
  padding: 10px 12px;
  display:flex;
  align-items:center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.slotName{ font-weight: 900; letter-spacing:.2px; }

.timeBig{
  margin-top: 10px;
  width: 100%;
  text-align: center;
  font-weight: 950;
  font-size: 28px;
  letter-spacing: 2px;
  padding: 10px 10px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,.14);
  background: rgba(255,255,255,.90);
  color: #0b1220;
}
.timeSmallHint{
  text-align: center;
  margin-top: 6px;
  font-size: 11px;
  color: var(--muted);
}

.slotBody{
  padding: 12px;
  display:flex;
  flex-direction: column;
  gap: 10px;
  min-height: 170px;
  justify-content: center;
}

.statusRow{
  display:flex;
  align-items:center;
  justify-content: space-between;
  color: var(--muted);
  font-size: 12px;
}
.statusText{ font-weight: 900; color: var(--white); }

.regRow{
  display:flex;
  align-items:center;
  justify-content: space-between;
  color: var(--muted);
  font-size: 12px;
}
.regValue{ font-weight: 900; color: var(--white); }

.bar{
  width: 100%;
  height: 10px;
  border-radius: 999px;
  background: rgba(255,255,255,.10);
  overflow:hidden;
  border: 1px solid rgba(255,255,255,.08);
}
.fill{ height: 100%; width: 100%; }
.fill.red{ background: var(--red); }
.fill.orange{ background: var(--orange); }
.fill.green{ background: var(--green); }

.rampLink{
  font-size: 12px;
  line-height: 1.35;
}
.rampLink a{
  color: #86efac;
  font-weight: 800;
}

.formCard{
  margin-top: 14px;
  border-radius: var(--radius);
  border: 1px solid var(--stroke);
  background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  box-shadow: var(--shadow);
  padding: 14px;
}
label{ display:block; color: var(--muted); font-size: 12px; margin-bottom: 6px; }
input{
  width: 100%;
  font-size: 18px;
  padding: 12px 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.06);
  color: var(--white);
  outline: none;
}
.btn{
  margin-top: 10px;
  width:100%;
  padding: 12px 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.10);
  color: var(--white);
  font-weight: 950;
  cursor: pointer;
  font-size: 16px;
}
.btn:hover{ background: rgba(255,255,255,.14); }
.btn:disabled{ opacity:.6; cursor:not-allowed; }

.msg{
  margin-top: 10px;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.04);
  display:none;
  font-size: 14px;
}
.small{
  margin-top: 10px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.4;
}
.selectedInfo{
  margin-top: 8px;
  color: var(--muted);
  font-size: 12px;
}
.selectedInfo b{ color: var(--white); }
</style>
</head>

<body>
<header>
  <div class="wrap top">
    <div>
      <h1>Fahrer Anmeldung</h1>
      <div class="sub">Nur Container mit Termin-Uhrzeit sind auswählbar.</div>
    </div>
    <div class="legend">
      <div class="badge"><span class="dot red"></span>Frei</div>
      <div class="badge"><span class="dot orange"></span>Angemeldet</div>
      <div class="badge"><span class="dot green"></span>An die Rampe</div>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <div id="grid" class="grid"></div>

    <div class="formCard">
      <div class="selectedInfo" id="selInfo">Bitte zuerst einen Container auswählen.</div>

      <div style="margin-top:10px;">
        <label>Kennzeichen</label>
        <input id="plate" placeholder="z.B. B-AB 1234" autocomplete="off" />
      </div>

      <button class="btn" id="sendBtn" disabled>Anmelden</button>

      <div id="msg" class="msg"></div>

      <div class="small">
        Hinweis: Container ohne Termin-Uhrzeit sind nicht auswählbar.
      </div>
    </div>
  </div>
</main>

<script>
const socket = io();
let state = null;
let selectedId = null;

const gridEl = document.getElementById("grid");
const plateEl = document.getElementById("plate");
const msgEl = document.getElementById("msg");
const btnEl = document.getElementById("sendBtn");
const selInfoEl = document.getElementById("selInfo");

function statusText(status){
  if (status === "green") return "An die Rampe";
  if (status === "orange") return "Angemeldet";
  return "Warten";
}
function hasTime(c){ return !!(c.time && c.time.trim()); }
function timeText(c){ return hasTime(c) ? c.time.trim() : "--:--"; }

function rampLinkHtml(status){
  if (status !== "green") return "";
  return `
    <div class="rampLink">
      <a href="https://maps.app.goo.gl/PCRKCpGGHQVNt7XG6" target="_blank" rel="noopener noreferrer">
        📍 Route zur Rampe öffnen
      </a>
    </div>
  `;
}

// frei = rot + kein Kennzeichen
function isFree(c){
  return c.status === "red" && (!c.plate || !c.plate.trim());
}

// wählbar: Termin gesetzt + frei
function isSelectableForDriver(c){
  return hasTime(c) && isFree(c);
}

// Anzeige HH:MM der Anmeldung
function registeredTime(iso){
  if (!iso) return "--:--";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "--:--";
  return d.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
}

function showMsg(text){
  msgEl.textContent = text;
  msgEl.style.display = "block";
}
function clearMsg(){
  msgEl.style.display = "none";
  msgEl.textContent = "";
}

function focusPlateInput(){
  if (!plateEl) return;
  plateEl.scrollIntoView({ behavior: "smooth", block: "center" });
  plateEl.focus({ preventScroll: true });
}

function updateSelectedInfo(){
  if (!state || !selectedId){
    selInfoEl.innerHTML = "Bitte zuerst einen <b>Container</b> auswählen.";
    btnEl.disabled = true;
    return;
  }
  const c = state[selectedId];
  selInfoEl.innerHTML = `Ausgewählt: <b>Container ${selectedId}</b> · Termin: <b>${timeText(c)}</b>`;
  btnEl.disabled = !isSelectableForDriver(c);
}

function renderAll(){
  gridEl.innerHTML = "";

  for (let i = 1; i <= 8; i++){
    const c = state[i];
    const selectable = isSelectableForDriver(c);
    const disabled = !selectable;
    const time = timeText(c);
    const reg = registeredTime(c.registeredAt);

    let headNote = "";
    if (!hasTime(c)) headNote = "kein Termin";
    else if (!isFree(c)) headNote = "belegt";
    else headNote = "frei";

    const slot = document.createElement("div");
    slot.className = "slot" + (disabled ? " disabled" : "") + (selectedId === i ? " selected" : "");
    slot.id = "slot-" + i;

    slot.innerHTML = `
      <div class="slotTop">
        <div class="slotName">Container ${i}</div>
        <div style="color: var(--muted); font-size: 12px;">${headNote}</div>
      </div>
      <div class="slotBody">
        <div class="timeBig">⏱ ${time}</div>
        <div class="timeSmallHint">Termin-Uhrzeit</div>

        <div class="statusRow">
          <div>Status</div>
          <div class="statusText">${statusText(c.status)}</div>
        </div>

        <div class="regRow">
          <div>Angemeldet</div>
          <div class="regValue">${reg}</div>
        </div>

        ${rampLinkHtml(c.status)}

        <div class="bar"><div class="fill ${c.status}"></div></div>
      </div>
    `;

    slot.addEventListener("click", () => {
      clearMsg();

      if (disabled){
        if (!hasTime(c)) showMsg("Dieser Container hat noch keinen Termin. Bitte einen Container mit Uhrzeit wählen.");
        else showMsg("Dieser Container ist bereits belegt. Bitte einen anderen wählen.");
        return;
      }

      selectedId = (selectedId === i) ? null : i;
      renderAll();
      updateSelectedInfo();
      if (selectedId) focusPlateInput();
    });

    gridEl.appendChild(slot);
  }
}

function applyOne(id, data){
  state[id] = data;

  if (selectedId === id && !isSelectableForDriver(data)){
    selectedId = null;
    showMsg("Dein ausgewählter Container ist nicht mehr verfügbar. Bitte neu auswählen.");
  }

  renderAll();
  updateSelectedInfo();
}

socket.on("init", (s) => {
  state = s;
  renderAll();
  updateSelectedInfo();
});

socket.on("statusChanged", ({ id, data }) => {
  if (!state) return;
  applyOne(Number(id), data);
});

btnEl.addEventListener("click", () => {
  clearMsg();

  if (!state || !selectedId){
    showMsg("Bitte zuerst einen Container auswählen.");
    return;
  }

  const c = state[selectedId];
  if (!isSelectableForDriver(c)){
    showMsg("Dieser Container ist nicht auswählbar. Bitte einen anderen wählen.");
    return;
  }

  const plate = plateEl.value.trim();
  if (!plate){
    showMsg("Bitte Kennzeichen eingeben.");
    return;
  }

  btnEl.disabled = true;
  socket.emit("driverRegister", { id: selectedId, plate });
});

socket.on("driverRegisterResult", ({ ok, message }) => {
  btnEl.disabled = false;
  showMsg(message);

  if (ok){
    // nach erfolgreicher Anmeldung direkt in die Viewer-Ansicht
    window.location.href = "/viewer.html";
  }
});
</script>
</body>
</html>
