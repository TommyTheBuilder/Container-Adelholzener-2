<main>
  <div class="wrap">
    <div id="grid" class="grid"></div>
  </div>
</main>

<div id="toast" class="toast"></div>

<script>
const socket = io();

function statusText(status){
  if (status === "green") return "An die Rampe";
  if (status === "orange") return "Angemeldet";
  return "Warten";
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(showToast._to);
  showToast._to = setTimeout(()=> t.style.display="none", 2200);
}

function renderAll(state){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  for(let i=1;i<=8;i++){
    const c = state[i];
    const plate = (c.plate && c.plate.trim()) ? c.plate.trim() : "---";
    const time = (c.time && c.time.trim()) ? c.time.trim() : "--:--";

    const card = document.createElement("div");
    card.className = "card";
    card.id = "card-" + i;
    card.innerHTML = `
      <div class="cardTop">
        <div class="name">Container ${i}</div>
        <div class="pills">
          <div class="pill" id="pill-${i}">${statusText(c.status)}</div>
          <div class="pill" id="time-${i}">⏱ ${time}</div>
        </div>
      </div>
      <div class="statusArea">
        <div class="bigPlate" id="plate-${i}">${plate}</div>
        <div class="metaRow">
          <div id="metaStatus-${i}">${statusText(c.status)}</div>
          <div id="metaTime-${i}">Termin: ${time}</div>
        </div>
        <div class="bar"><div class="barFill ${c.status}" id="bar-${i}"></div></div>
      </div>
    `;
    grid.appendChild(card);
  }
}

function applyOne(id, data){
  const plate = (data.plate && data.plate.trim()) ? data.plate.trim() : "---";
  const time = (data.time && data.time.trim()) ? data.time.trim() : "--:--";

  document.getElementById("pill-"+id).textContent = statusText(data.status);
  document.getElementById("time-"+id).textContent = "⏱ " + time;

  document.getElementById("plate-"+id).textContent = plate;
  document.getElementById("metaStatus-"+id).textContent = statusText(data.status);
  document.getElementById("metaTime-"+id).textContent = "Termin: " + time;

  document.getElementById("bar-"+id).className = "barFill " + data.status;
}

socket.on("init", (state) => renderAll(state));

socket.on("statusChanged", ({ id, data }) => {
  applyOne(id, data);
  showToast(`Container ${id}: ${statusText(data.status)} · ${data.plate ? data.plate : "---"}`);
});
</script>
</body>
</html>
