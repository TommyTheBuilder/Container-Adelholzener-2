<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Viewer</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  body{margin:0;font-family:Arial;background:#0b1220;color:#f6f8ff}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:12px}
  @media(min-width:860px){.grid{grid-template-columns:repeat(4,1fr)}}
  .card{border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:12px;background:rgba(255,255,255,.05)}
  .plate{margin-top:10px;background:white;color:#0b1220;font-weight:900;font-size:28px;letter-spacing:2px;padding:10px;border-radius:12px;text-align:center}
  .pill{display:inline-block;margin-top:8px;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.12);font-size:12px}
  .bar{height:10px;border-radius:999px;margin-top:10px;background:rgba(255,255,255,.10);overflow:hidden}
  .fill{height:100%}
  .red{background:#ef4444}
  .orange{background:#f59e0b}
  .green{background:#22c55e}
</style>
</head>
<body>
<div id="grid" class="grid"></div>

<script>
const socket = io();

function statusText(s){
  if(s==="green") return "An die Rampe";
  if(s==="orange") return "Angemeldet";
  return "Warten";
}
function timeText(t){ return (t && t.trim()) ? t.trim() : "--:--"; }
function plateText(p){ return (p && p.trim()) ? p.trim() : "---"; }

function renderAll(state){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  for(let i=1;i<=8;i++){
    const c = state[i];
    const div = document.createElement("div");
    div.className = "card";
    div.id = "card-"+i;
    div.innerHTML = `
      <div><b>Container ${i}</b></div>
      <div class="pill">⏱ ${timeText(c.time)} · ${statusText(c.status)}</div>
      <div class="plate" id="plate-${i}">${plateText(c.plate)}</div>
      <div class="bar"><div class="fill ${c.status}" id="bar-${i}"></div></div>
    `;
    grid.appendChild(div);
  }
}

function applyOne(id, data){
  document.getElementById("plate-"+id).textContent = plateText(data.plate);
  document.getElementById("bar-"+id).className = "fill " + data.status;
}

socket.on("init", (state) => renderAll(state));
socket.on("statusChanged", ({ id, data }) => applyOne(id, data));
</script>
</body>
</html>
