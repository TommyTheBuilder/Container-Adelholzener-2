<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Container Board</title>
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
  --header-bg: #0f2f67;
  --brand-blue: #2563EB;

  --body-bg: #F3F4F6;
  --panel-bg: #FFFFFF;
  --panel-border: #E2E8F0;
  --panel-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  --text-main: #111827;
  --text-muted: #475569;
  --table-head-bg: #E2E8F0;
  --table-head-text: #334155;

  --status-red: #ef4444;
  --status-orange: #f59e0b;
  --status-green: #22c55e;
}

* { box-sizing: border-box; }
html, body { min-height: 100%; }
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: var(--text-main);
  background: var(--body-bg);
}

body.dark {
  --body-bg: #121826;
  --panel-bg: #1E2536;
  --panel-border: #334155;
  --panel-shadow: none;
  --text-main: #F8FAFC;
  --text-muted: #CBD5E1;
  --table-head-bg: #0F172A;
  --table-head-text: #E2E8F0;
}

header {
  position: sticky;
  top: 0;
  z-index: 20;
  width: 100%;
  background: var(--header-bg);
  color: #fff;
  box-shadow: 0 2px 10px rgba(15, 23, 42, .35);
}

.headerBar {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding: 10px 20px;
}

.logoLink {
  display: inline-flex;
  align-items: center;
}

.logoImage {
  height: 42px;
  width: auto;
  object-fit: contain;
}

.headerActions {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: auto;
}

.iconBtn,
.navBtn {
  border: 1px solid rgba(255,255,255,.3);
  background: rgba(255,255,255,.14);
  color: #fff;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 700;
}

.iconBtn {
  width: 40px;
  height: 40px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.navBtn {
  height: 40px;
  padding: 0 14px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
}

.navBtn.primary,
.langToggle {
  background: var(--brand-blue);
  border-color: var(--brand-blue);
  color: #fff;
}

.settingsWrap { position: relative; }

.settingsMenu {
  position: absolute;
  right: 0;
  top: calc(100% + 8px);
  min-width: 240px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 24px rgba(15,23,42,.25);
  display: none;
  z-index: 30;
  background: #F1F5F9;
}

.settingsMenu.open { display: block; }

.menuItem {
  width: 100%;
  display: block;
  text-align: left;
  border: 0;
  margin: 0;
  padding: 11px 14px;
  font-size: 14px;
  cursor: pointer;
}

.menuItem.darkSection {
  background: #1F2937;
  color: #fff;
  font-weight: 700;
}

.menuItem.lightSection {
  background: #F1F5F9;
  color: #0F172A;
  border-bottom: 1px solid #E2E8F0;
}

.menuItem.lightSection:last-of-type { border-bottom: 0; }

.toolbar {
  max-width: 1120px;
  margin: 0 auto;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.titleBlock h1 { margin: 0; font-size: 20px; }
.titleBlock .sub { margin: 4px 0 0; color: rgba(255,255,255,.85); font-size: 13px; }

.legend {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.badge {
  display: flex;
  align-items: center;
  gap: 8px;
  border-radius: 999px;
  padding: 8px 12px;
  border: 1px solid var(--panel-border);
  background: var(--panel-bg);
  color: var(--text-main);
  box-shadow: var(--panel-shadow);
  font-size: 13px;
}

.dot { width: 10px; height: 10px; border-radius: 999px; }
.dot.red { background: var(--status-red); }
.dot.orange { background: var(--status-orange); }
.dot.green { background: var(--status-green); }

.langToggle {
  border-radius: 999px;
  height: 36px;
  padding: 0 12px;
  cursor: pointer;
  font-weight: 700;
  border: 0;
}

.wrap {
  max-width: 1120px;
  margin: 0 auto;
  padding: 18px 20px 24px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

@media (min-width: 860px) {
  .grid { grid-template-columns: repeat(4, 1fr); }
}

.card {
  border-radius: 14px;
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  box-shadow: var(--panel-shadow);
  overflow: hidden;
}

.cardTop {
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--panel-border);
  background: var(--table-head-bg);
  color: var(--table-head-text);
}

.name { font-weight: 700; letter-spacing: .3px; }
.pills { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

.pill {
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid var(--panel-border);
  background: var(--panel-bg);
  color: var(--text-muted);
}

.statusArea {
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: center;
  min-height: 170px;
}

.regBox {
  width: 100%;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
}

.bigPlate {
  width: 100%;
  text-align: center;
  font-weight: 900;
  font-size: clamp(22px, 3vw, 34px);
  letter-spacing: 3px;
  padding: 12px 10px;
  border-radius: 12px;
  border: 1px solid var(--panel-border);
  background: #FFFFFF;
  color: #0b1220;
}

body.dark .bigPlate {
  background: #0F172A;
  border-color: #334155;
  color: #F8FAFC;
}

.metaRow {
  width: 100%;
  display: flex;
  justify-content: space-between;
  gap: 12px;
  color: var(--text-muted);
  font-size: 12px;
  flex-wrap: wrap;
}

.bar {
  width: 100%;
  height: 10px;
  border-radius: 999px;
  background: #E2E8F0;
  overflow: hidden;
  border: 1px solid var(--panel-border);
}

body.dark .bar { background: #0F172A; }

.barFill { height: 100%; width: 100%; }
.barFill.red { background: var(--status-red); }
.barFill.orange { background: var(--status-orange); }
.barFill.green { background: var(--status-green); }

.rampCta {
  width: 100%;
  margin-top: 4px;
  padding: 8px 10px;
  border-radius: 10px;
  border: 1px solid rgba(34,197,94,.45);
  background: rgba(34,197,94,.14);
  font-size: 13px;
  line-height: 1.35;
}
.rampCta a { color: #166534; font-weight: 700; }
body.dark .rampCta a { color: #dcfce7; }
.rampUrl { margin-top: 4px; color: #15803d; font-size: 12px; word-break: break-all; }
body.dark .rampUrl { color: #bbf7d0; }
</style>
</head>

<body>
<header>
  <div class="headerBar">
    <a href="/public/viewer.html" class="logoLink" aria-label="ICS Home">
      <img src="/logo.png" alt="ICS Logo" class="logoImage" />
    </a>

    <div class="headerActions">
      <button class="iconBtn" type="button" aria-label="Benachrichtigungen">🔔</button>
      <a class="navBtn primary" href="/public/driver.html">Frachtführerstammdaten</a>
      <div class="settingsWrap">
        <button class="iconBtn" id="settingsToggle" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Einstellungen">⚙️</button>
        <div class="settingsMenu" id="settingsMenu" role="menu">
          <button class="menuItem darkSection" type="button">Admin</button>
          <button class="menuItem lightSection" type="button">Passwort ändern</button>
          <a class="menuItem lightSection" href="/public/driver.html">Container Anmeldung</a>
          <button class="menuItem lightSection" type="button" id="darkmodeToggle">Darkmode umschalten</button>
          <button class="menuItem lightSection" type="button">Modul-Dashboard</button>
          <button class="menuItem darkSection" type="button">Logout</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="titleBlock">
      <h1 id="title">Container Status</h1>
      <div class="sub" id="subtitle">Live-Übersicht</div>
    </div>
    <div class="legend">
      <button id="langToggle" class="langToggle" type="button">English</button>
      <div class="badge"><span class="dot red"></span><span id="legend-red">Warten</span></div>
      <div class="badge"><span class="dot orange"></span><span id="legend-orange">Angemeldet</span></div>
      <div class="badge"><span class="dot green"></span><span id="legend-green">An die Rampe</span></div>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <div id="grid" class="grid"></div>
  </div>
</main>

<script>
const socket = io();
let audioContext = null;
let currentLang = localStorage.getItem("viewerLang") || "de";
let currentState = null;

const I18N = {
  de: {
    title: "Container Status",
    subtitle: "Live-Übersicht",
    statusRed: "Warten",
    statusOrange: "Angemeldet",
    statusGreen: "An die Rampe",
    scheduleLabel: "Termin",
    registeredAt: "Angemeldet um",
    registered: "Angemeldet",
    routeCta: "📍 Route zur Rampe öffnen",
    toggle: "English"
  },
  en: {
    title: "Container Status",
    subtitle: "Live overview",
    statusRed: "Waiting",
    statusOrange: "Checked in",
    statusGreen: "Go to ramp",
    scheduleLabel: "Slot",
    registeredAt: "Checked in at",
    registered: "Checked in",
    routeCta: "📍 Open route to ramp",
    toggle: "Deutsch"
  }
};

function applyTheme(theme) {
  const isDark = theme === "dark";
  document.body.classList.toggle("dark", isDark);
  localStorage.setItem("viewer-theme", isDark ? "dark" : "light");
}

function toggleSettingsMenu(force) {
  const menu = document.getElementById("settingsMenu");
  const btn = document.getElementById("settingsToggle");
  const shouldOpen = typeof force === "boolean" ? force : !menu.classList.contains("open");
  menu.classList.toggle("open", shouldOpen);
  btn.setAttribute("aria-expanded", String(shouldOpen));
}

function t(key){
  return I18N[currentLang]?.[key] || I18N.de[key] || key;
}

function isGreenStatus(status){
  const normalized = String(status || "").trim().toLowerCase();
  return normalized === "green" || normalized === "to_ramp" || normalized === "waiting_customs" || normalized === "customs_released";
}

function statusText(status){
  const normalized = String(status || "").trim().toLowerCase();
  if (normalized === "customs_released") return "Zollfreigabe erteilt";
  if (normalized === "waiting_customs") return "Warten auf Zollfreigabe";
  if (normalized === "to_ramp" || normalized === "green") return t("statusGreen");
  if (normalized === "registered" || normalized === "orange") return t("statusOrange");
  return t("statusRed");
}

function statusTone(status){
  const normalized = String(status || "").trim().toLowerCase();
  if (normalized === "registered" || normalized === "orange") return "orange";
  if (["to_ramp","waiting_customs","customs_released","green"].includes(normalized)) return "green";
  return "red";
}

function timeText(t){ return (t && t.trim()) ? t.trim() : "--:--"; }
function plateText(p){ return (p && p.trim()) ? p.trim() : "---"; }

function rampLinkHtml(status){
  if (!isGreenStatus(status)) return "";
  return `<div class="rampCta"><a href="https://maps.app.goo.gl/PCRKCpGGHQVNt7XG6" target="_blank" rel="noopener noreferrer">${t("routeCta")}</a><div class="rampUrl">https://maps.app.goo.gl/PCRKCpGGHQVNt7XG6</div></div>`;
}

function registeredTime(iso){
  if (!iso) return "--:--";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "--:--";
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function renderAll(state){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for(let i=1;i<=8;i++){
    const c = state[i];
    const time = timeText(c.time);
    const reg = registeredTime(c.registeredAt);

    const card = document.createElement("div");
    card.className = "card";
    card.id = "card-" + i;

    card.innerHTML = `
      <div class="cardTop">
        <div class="name">Container ${i}</div>
        <div class="pills">
          <div class="pill" id="pill-${i}">${statusText(c.status)}</div>
          <div class="pill" id="time-${i}">⏱ Termin ${time}</div>
        </div>
      </div>
      <div class="statusArea">
        <div class="regBox" id="regBox-${i}">🕒 ${t("registeredAt")}: <span id="reg-${i}">${reg}</span></div>
        <div class="bigPlate" id="plate-${i}">${plateText(c.plate)}</div>
        <div class="metaRow">
          <div id="metaStatus-${i}">${statusText(c.status)}</div>
          <div id="metaTime-${i}">${t("scheduleLabel")}: ${time}</div>
          <div id="metaReg-${i}">${t("registered")}: ${reg}</div>
        </div>
        <div id="ramp-${i}" style="width:100%;">${rampLinkHtml(c.status)}</div>
        <div class="bar"><div class="barFill ${statusTone(c.status)}" id="bar-${i}"></div></div>
      </div>
    `;

    grid.appendChild(card);
  }
}

function applyOne(id, data){
  const time = timeText(data.time);
  const reg = registeredTime(data.registeredAt);

  document.getElementById("pill-"+id).textContent = statusText(data.status);
  document.getElementById("time-"+id).textContent = "⏱ Termin " + time;
  document.getElementById("plate-"+id).textContent = plateText(data.plate);
  document.getElementById("metaStatus-"+id).textContent = statusText(data.status);
  document.getElementById("metaTime-"+id).textContent = t("scheduleLabel") + ": " + time;
  document.getElementById("metaReg-"+id).textContent = t("registered") + ": " + reg;
  document.getElementById("ramp-"+id).innerHTML = rampLinkHtml(data.status);
  document.getElementById("bar-"+id).className = "barFill " + statusTone(data.status);
}

function applyStaticTranslations(){
  document.getElementById("title").textContent = t("title");
  document.getElementById("subtitle").textContent = t("subtitle");
  document.getElementById("legend-red").textContent = t("statusRed");
  document.getElementById("legend-orange").textContent = t("statusOrange");
  document.getElementById("legend-green").textContent = t("statusGreen");
  document.getElementById("langToggle").textContent = t("toggle");
}

function triggerNotification(){
  if (navigator.vibrate) navigator.vibrate([120, 80, 120]);
  try {
    if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
    if (audioContext.state === "suspended") audioContext.resume();

    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    oscillator.type = "sine";
    oscillator.frequency.value = 880;
    gainNode.gain.value = 0.15;
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    oscillator.start();
    oscillator.stop(audioContext.currentTime + 0.2);
  } catch (error) {
    console.warn("Konnte Benachrichtigungston nicht abspielen:", error);
  }
}

document.getElementById("langToggle").addEventListener("click", () => {
  currentLang = currentLang === "de" ? "en" : "de";
  localStorage.setItem("viewerLang", currentLang);
  applyStaticTranslations();
  if (currentState) renderAll(currentState);
});

document.getElementById("settingsToggle").addEventListener("click", (event) => {
  event.stopPropagation();
  toggleSettingsMenu();
});

document.getElementById("darkmodeToggle").addEventListener("click", () => {
  const nextTheme = document.body.classList.contains("dark") ? "light" : "dark";
  applyTheme(nextTheme);
  toggleSettingsMenu(false);
});

document.addEventListener("click", (event) => {
  const wrap = document.querySelector(".settingsWrap");
  if (!wrap.contains(event.target)) toggleSettingsMenu(false);
});

document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") toggleSettingsMenu(false);
});

socket.on("init", (state) => {
  currentState = state;
  applyStaticTranslations();
  renderAll(state);
});

socket.on("statusChanged", ({ id, data }) => {
  if (currentState) currentState[id] = data;
  applyOne(id, data);
  triggerNotification();
});

applyTheme(localStorage.getItem("viewer-theme") || "light");
applyStaticTranslations();
</script>
</body>
</html>
