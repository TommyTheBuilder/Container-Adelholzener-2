<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Container Board</title>
<script src="/socket.io/socket.io.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#111a2e;
  --muted:#a7b3d1;
  --white:#f6f8ff;
  --green:#22c55e;
  --orange:#f59e0b;
  --red:#ef4444;
  --stroke:rgba(255,255,255,.08);
  --shadow: 0 10px 30px rgba(0,0,0,.35);
  --radius: 18px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
  color:var(--white);
  background: radial-gradient(1200px 600px at 20% 0%, rgba(59,130,246,.12), transparent 55%),
              radial-gradient(900px 600px at 80% 20%, rgba(34,197,94,.10), transparent 55%),
              var(--bg);
}
header{
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
  background: rgba(11,18,32,.65);
  border-bottom: 1px solid var(--stroke);
  z-index: 10;
}
.wrap{
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px 18px;
}
.top{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
}
h1{ margin:0; font-size: 20px; letter-spacing:.4px; }
.sub{ margin:6px 0 0; color: var(--muted); font-size: 13px; }

.legend{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  color: var(--muted);
  font-size: 13px;
}
.langToggle{
  border:1px solid var(--stroke);
  background: rgba(255,255,255,.03);
  color: var(--white);
  border-radius: 999px;
  padding: 8px 12px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
}
.badge{
  display:flex; align-items:center; gap:8px;
  padding: 8px 10px;
  border-radius: 999px;
  border:1px solid var(--stroke);
  background: rgba(255,255,255,.03);
}
.dot{width:10px;height:10px;border-radius:999px}
.dot.red{background:var(--red)}
.dot.orange{background:var(--orange)}
.dot.green{background:var(--green)}

main .wrap{ padding-top: 18px; padding-bottom: 22px; }

.grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
@media (min-width: 860px){
  .grid{ grid-template-columns: repeat(4, 1fr); }
}

.card{
  border-radius: var(--radius);
  background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  border: 1px solid var(--stroke);
  box-shadow: var(--shadow);
  overflow:hidden;
}

.cardTop{
  padding: 12px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--stroke);
}
.name{ font-weight: 800; letter-spacing:.3px; }
.pills{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }

.pill{
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 999px;
  border:1px solid var(--stroke);
  background: rgba(255,255,255,.04);
  color: var(--muted);
}


.statusArea{
  padding: 16px 14px 16px;
  display:flex;
  flex-direction:column;
  gap: 10px;
  align-items:center;
  justify-content:center;
  min-height: 170px;
}

.bigPlate{
  width: 100%;
  text-align:center;
  font-weight: 900;
  font-size: clamp(22px, 3vw, 34px);
  letter-spacing: 3px;
  padding: 12px 10px;
  border-radius: 14px;
  background: rgba(255,255,255,.92);
  color: #0b1220;
}

.metaRow{
  width:100%;
  display:flex;
  justify-content:space-between;
  gap:12px;
  color: var(--muted);
  font-size: 12px;
  flex-wrap:wrap;
}

.bar{
  width: 100%;
  height: 10px;
  border-radius: 999px;
  background: rgba(255,255,255,.10);
  overflow:hidden;
  border: 1px solid rgba(255,255,255,.08);
}
.barFill{ height:100%; width: 100%; }
.barFill.red{ background: var(--red); }
.barFill.orange{ background: var(--orange); }
.barFill.green{ background: var(--green); }

.rampCta{
  width: 100%;
  margin-top: 4px;
  padding: 8px 10px;
  border-radius: 10px;
  border: 1px solid rgba(34,197,94,.45);
  background: rgba(34,197,94,.14);
  font-size: 13px;
  line-height: 1.35;
}
.rampCta a{
  color: #dcfce7;
  font-weight: 900;
  text-decoration: underline;
  display: inline-block;
}
.rampUrl{
  margin-top: 4px;
  color: #bbf7d0;
  font-size: 12px;
  word-break: break-all;
}
</style>
</head>

<body>
<header>
  <div class="wrap top">
    <div>
      <h1 id="title">Container Status</h1>
      <div class="sub" id="subtitle">Live-Übersicht</div>
    </div>
    <div class="legend">
      <button id="langToggle" class="langToggle" type="button">English</button>
      <div class="badge"><span class="dot red"></span><span id="legend-red">Warten</span></div>
      <div class="badge"><span class="dot orange"></span><span id="legend-orange">Angemeldet</span></div>
      <div class="badge"><span class="dot green"></span><span id="legend-green">An die Rampe</span></div>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <div id="grid" class="grid"></div>
  </div>
</main>

<script>
const socket = io();
let audioContext = null;
let currentLang = localStorage.getItem("viewerLang") || "de";
let currentState = null;

const I18N = {
  de: {
    title: "Container Status",
    subtitle: "Live-Übersicht",
    statusRed: "Warten",
    statusOrange: "Angemeldet",
    statusGreen: "An die Rampe",
    scheduleShort: "⏱ Termin",
    scheduleLabel: "Termin",
    registeredAt: "Angemeldet um",
    registered: "Angemeldet",
    routeCta: "📍 Route zur Rampe öffnen",
    toggle: "English"
  },
  en: {
    title: "Container Status",
    subtitle: "Live overview",
    statusRed: "Waiting",
    statusOrange: "Checked in",
    statusGreen: "Go to ramp",
    scheduleShort: "⏱ Slot",
    scheduleLabel: "Slot",
    registeredAt: "Checked in at",
    registered: "Checked in",
    routeCta: "📍 Open route to ramp",
    toggle: "Deutsch"
  }
};

function t(key){
  return I18N[currentLang]?.[key] || I18N.de[key] || key;
}

function isGreenStatus(status){
  return String(status || "").trim().toLowerCase() === "green";
}

function statusText(status){
  const normalized = String(status || "").trim().toLowerCase();
  if (normalized === "green") return t("statusGreen");
  if (normalized === "orange") return t("statusOrange");
  return t("statusRed");
}

function timeText(t){
  return (t && t.trim()) ? t.trim() : "--:--";
}

function plateText(p){
  return (p && p.trim()) ? p.trim() : "---";
}

function rampLinkHtml(status){
  if (!isGreenStatus(status)) return "";
  return `
    <div class="rampCta">
        <a href="https://maps.app.goo.gl/PCRKCpGGHQVNt7XG6" target="_blank" rel="noopener noreferrer">
        ${t("routeCta")}
      </a>
      <div class="rampUrl">
        https://maps.app.goo.gl/PCRKCpGGHQVNt7XG6
      </div>
    </div>
  `;
}

// zeigt HH:MM aus registeredAt (lokale Zeit)
function registeredTime(iso){
  if (!iso) return "--:--";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "--:--";
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function renderAll(state){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for(let i=1;i<=8;i++){
    const c = state[i];
    const time = timeText(c.time);
    const reg = registeredTime(c.registeredAt);

    const card = document.createElement("div");
    card.className = "card";
    card.id = "card-" + i;

    card.innerHTML = `
      <div class="cardTop">
        <div class="name">Container ${i}</div>
        <div class="pills">
          <div class="pill" id="pill-${i}">${statusText(c.status)}</div>
          <div class="pill" id="time-${i}">${t("scheduleShort")} ${time}</div>
        </div>
      </div>
      <div class="statusArea">
        <div class="regBox ${String(c.status || "").trim().toLowerCase() === "orange" ? "is-active" : ""}" id="regBox-${i}">🕒 ${t("registeredAt")}: <span id="reg-${i}">${reg}</span></div>
        <div class="regBox" id="regBox-${i}">🕒 Angemeldet um: <span id="reg-${i}">${reg}</span></div>
        <div class="bigPlate" id="plate-${i}">${plateText(c.plate)}</div>
        <div class="metaRow">
          <div id="metaStatus-${i}">${statusText(c.status)}</div>
          <div id="metaTime-${i}">${t("scheduleLabel")}: ${time}</div>
          <div id="metaReg-${i}">${t("registered")}: ${reg}</div>
        </div>
        <div id="ramp-${i}" style="width:100%;">${rampLinkHtml(c.status)}</div>
        <div class="bar"><div class="barFill ${String(c.status || "").trim().toLowerCase()}" id="bar-${i}"></div></div>
      </div>
    `;

    grid.appendChild(card);
  }
}

function applyOne(id, data){
  const time = timeText(data.time);
  const reg = registeredTime(data.registeredAt);

  document.getElementById("pill-"+id).textContent = statusText(data.status);
  document.getElementById("time-"+id).textContent = t("scheduleShort") + " " + time;
  document.getElementById("reg-"+id).textContent = reg;


  document.getElementById("plate-"+id).textContent = plateText(data.plate);
  document.getElementById("metaStatus-"+id).textContent = statusText(data.status);
  document.getElementById("metaTime-"+id).textContent = t("scheduleLabel") + ": " + time;
  document.getElementById("metaReg-"+id).textContent = t("registered") + ": " + reg;
  document.getElementById("ramp-"+id).innerHTML = rampLinkHtml(data.status);

  const normalized = String(data.status || "").trim().toLowerCase();
  const safeStatus = ["red", "orange", "green"].includes(normalized) ? normalized : "red";
  document.getElementById("bar-"+id).className = "barFill " + safeStatus;
}

function applyStaticTranslations(){
  document.getElementById("title").textContent = t("title");
  document.getElementById("subtitle").textContent = t("subtitle");
  document.getElementById("legend-red").textContent = t("statusRed");
  document.getElementById("legend-orange").textContent = t("statusOrange");
  document.getElementById("legend-green").textContent = t("statusGreen");
  document.getElementById("langToggle").textContent = t("toggle");
}

function triggerNotification(){
  if (navigator.vibrate) {
    navigator.vibrate([120, 80, 120]);
  }

  try {
    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioContext.state === "suspended") {
      audioContext.resume();
    }

    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();

    oscillator.type = "sine";
    oscillator.frequency.value = 880;
    gainNode.gain.value = 0.15;

    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);

    oscillator.start();
    oscillator.stop(audioContext.currentTime + 0.2);
  } catch (error) {
    console.warn("Konnte Benachrichtigungston nicht abspielen:", error);
  }
}

document.getElementById("langToggle").addEventListener("click", () => {
  currentLang = currentLang === "de" ? "en" : "de";
  localStorage.setItem("viewerLang", currentLang);
  applyStaticTranslations();
  if (currentState) renderAll(currentState);
});

socket.on("init", (state) => {
  currentState = state;
  applyStaticTranslations();
  renderAll(state);
});

socket.on("statusChanged", ({ id, data }) => {
  if (currentState) currentState[id] = data;
  applyOne(id, data);
  triggerNotification();
});

applyStaticTranslations();
</script>
</body>
</html>
