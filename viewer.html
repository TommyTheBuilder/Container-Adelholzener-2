<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Container Board</title>
<script src="/socket.io/socket.io.js"></script>
<script>
  const __design = new URLSearchParams(location.search).get("design");
  document.documentElement.dataset.design = __design === "2" ? "2" : "1";
</script>

<style>
:root{
  --bg:#0b1220;
  --card:#111a2e;
  --muted:#a7b3d1;
  --white:#f6f8ff;
  --green:#22c55e;
  --red:#ef4444;
  --stroke:rgba(255,255,255,.08);
  --shadow: 0 10px 30px rgba(0,0,0,.35);
  --radius: 18px;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
  color:var(--white);
  background: radial-gradient(1200px 600px at 20% 0%, rgba(59,130,246,.12), transparent 55%),
              radial-gradient(900px 600px at 80% 20%, rgba(34,197,94,.10), transparent 55%),
              var(--bg);
}

header{
  overflow:hidden;
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
  background: rgba(11,18,32,.65);
  border-bottom: 1px solid var(--stroke);
  z-index: 10;
}


header::after{
  content:"";
  position:absolute;
  top:6px;
  right:18px;
  bottom:6px;
  width:140px;
  background: url("/logo.png") no-repeat right center / contain;
  opacity:.16;
  pointer-events:none;
}
header .wrap{ position: relative; z-index: 1; }
.top{ padding-right: 152px; }

html[data-design="2"] body{
  background: radial-gradient(1200px 600px at 80% 0%, rgba(14,165,233,.16), transparent 55%),
              radial-gradient(900px 600px at 20% 20%, rgba(245,158,11,.12), transparent 55%),
              var(--bg);
}
html[data-design="2"] header{
  background: linear-gradient(90deg, rgba(11,18,32,.88), rgba(11,18,32,.58));
  border-bottom-color: rgba(255,255,255,.16);
}
html[data-design="2"] header::after{
  left:18px;
  right:auto;
  width:168px;
  background: url("/logo.png") no-repeat left center / contain;
  opacity:.24;
  filter: drop-shadow(0 0 12px rgba(255,255,255,.2));
}
html[data-design="2"] .top{
  padding-right: 0;
  padding-left: 180px;
}

@media (max-width: 900px){
  header::after{
    width: 108px;
    opacity: .12;
  }
  .top,
  html[data-design="2"] .top{
    padding-left: 0;
    padding-right: 0;
  }
}

@media (max-width: 640px){
  header::after{ display:none; }
}

@media (prefers-color-scheme: light){
  :root{
    --bg:#eef3fb;
    --card:#ffffff;
    --muted:#3d4c68;
    --white:#10213b;
    --stroke:rgba(16,33,59,.18);
  }
  body{
    background: radial-gradient(1100px 520px at 20% 0%, rgba(59,130,246,.20), transparent 60%),
                radial-gradient(900px 600px at 80% 20%, rgba(16,185,129,.16), transparent 60%),
                var(--bg);
  }
  html[data-design="2"] body{
    background: radial-gradient(1200px 600px at 80% 0%, rgba(14,165,233,.20), transparent 55%),
                radial-gradient(900px 600px at 20% 20%, rgba(245,158,11,.18), transparent 55%),
                var(--bg);
  }
  header{
    background: rgba(255,255,255,.82);
  }
  html[data-design="2"] header{
    background: linear-gradient(90deg, rgba(255,255,255,.92), rgba(255,255,255,.72));
    border-bottom-color: rgba(16,33,59,.20);
  }
}

.wrap{
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px 18px;
}

.top{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
}

h1{
  margin:0;
  font-size: 20px;
  letter-spacing:.4px;
}
.sub{
  margin:6px 0 0;
  color: var(--muted);
  font-size: 13px;
}

.legend{
  display:flex;
  gap:14px;
  align-items:center;
  flex-wrap:wrap;
  color: var(--muted);
  font-size: 13px;
}
.badge{
  display:flex;
  align-items:center;
  gap:8px;
  padding: 8px 10px;
  border-radius: 999px;
  border:1px solid var(--stroke);
  background: rgba(255,255,255,.03);
}
.dot{width:10px;height:10px;border-radius:999px}
.dot.red{background:var(--red)}
.dot.green{background:var(--green)}

main .wrap{ padding-top: 18px; padding-bottom: 22px; }

.grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
@media (min-width: 860px){
  .grid{ grid-template-columns: repeat(4, 1fr); }
}

.card{
  border-radius: var(--radius);
  background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  border: 1px solid var(--stroke);
  box-shadow: var(--shadow);
  overflow:hidden;
}

.cardTop{
  padding: 12px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--stroke);
}
.name{
  font-weight: 700;
  letter-spacing:.3px;
}
.statePill{
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 999px;
  border:1px solid var(--stroke);
  background: rgba(255,255,255,.04);
  color: var(--muted);
}

.statusArea{
  padding: 18px 14px 16px;
  display:flex;
  flex-direction:column;
  gap: 12px;
  align-items:center;
  justify-content:center;
  min-height: 140px;
}

.bigPlate{
  width: 100%;
  text-align:center;
  font-weight: 900;
  font-size: clamp(22px, 3vw, 34px);
  letter-spacing: 3px;
  padding: 12px 10px;
  border-radius: 14px;
  background: rgba(255,255,255,.92);
  color: #0b1220;
}

.bar{
  width: 100%;
  height: 10px;
  border-radius: 999px;
  background: rgba(255,255,255,.10);
  overflow:hidden;
  border: 1px solid rgba(255,255,255,.08);
}
.barFill{ height:100%; width: 100%; }

.barFill.red{ background: var(--red); }
.barFill.green{ background: var(--green); }

.toast{
  position: fixed;
  left: 50%;
  bottom: 18px;
  transform: translateX(-50%);
  background: rgba(17,26,46,.92);
  border: 1px solid var(--stroke);
  color: var(--white);
  padding: 10px 12px;
  border-radius: 14px;
  box-shadow: var(--shadow);
  display:none;
  font-size: 13px;
}
</style>
</head>

<body>
<header>
  <div class="wrap top">
    <div>
      <h1>Container Status</h1>
      <div class="sub">Live-Übersicht – Rot = Warten · Grün = An die Rampe</div>
    </div>
    <div class="legend">
      <div class="badge"><span class="dot red"></span>Warten</div>
      <div class="badge"><span class="dot green"></span>An die Rampe</div>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <div id="grid" class="grid"></div>
  </div>
</main>

<div id="toast" class="toast"></div>

<script>
const socket = io();

function stateText(color){
  return color === "green" ? "An die Rampe" : "Warten";
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(showToast._to);
  showToast._to = setTimeout(()=> t.style.display="none", 2200);
}

function renderAll(status){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  for(let i=1;i<=8;i++){
    const c = status[i];
    const plate = (c.plate && c.plate.trim()) ? c.plate.trim() : "---";
    const card = document.createElement("div");
    card.className = "card";
    card.id = "card-" + i;
    card.innerHTML = `
      <div class="cardTop">
        <div class="name">Container ${i}</div>
        <div class="statePill" id="pill-${i}">${stateText(c.color)}</div>
      </div>
      <div class="statusArea">
        <div class="bigPlate" id="plate-${i}">${plate}</div>
        <div class="bar"><div class="barFill ${c.color}" id="bar-${i}"></div></div>
      </div>
    `;
    grid.appendChild(card);
  }
}

function applyOne(id, data){
  document.getElementById("pill-"+id).textContent = stateText(data.color);
  document.getElementById("bar-"+id).className = "barFill " + data.color;
  document.getElementById("plate-"+id).textContent = (data.plate && data.plate.trim()) ? data.plate.trim() : "---";
}

socket.on("init", (status) => {
  renderAll(status);
});

socket.on("statusChanged", ({ id, data }) => {
  applyOne(id, data);
  showToast(`Container ${id}: ${stateText(data.color)} · ${data.plate ? data.plate : "---"}`);
});
</script>

</body>
</html>
